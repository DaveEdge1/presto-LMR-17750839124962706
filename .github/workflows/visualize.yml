name: Visualize Latest CFR Results

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["LMR CFR Reconstruction"]
    types: [completed]

jobs:
  find-latest-cfr-run:
    name: Find Latest CFR Run
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    outputs:
      run_number: ${{ steps.get_run.outputs.run_number }}
      run_id: ${{ steps.get_run.outputs.run_id }}
      artifact_name: ${{ steps.get_run.outputs.artifact_name }}

    steps:
        - name: Find CFR run and artifact
          id: get_run
          env:
            GH_TOKEN: ${{ github.token }}
          run: |
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              run_id="${{ github.event.workflow_run.id }}"
              run_number="${{ github.event.workflow_run.run_number }}"
            else
              latest_run=$(gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/actions/workflows/cfr-custom.yml/runs?status=success&per_page=1" \
                --jq '.workflow_runs[0]')
              run_id=$(echo "$latest_run" | jq -r '.id')
              run_number=$(echo "$latest_run" | jq -r '.run_number')
            fi

            if [ "$run_id" = "null" ] || [ -z "$run_id" ]; then
              echo "Error: No successful CFR runs found"
              exit 1
            fi

            artifact_name="lmr-reconstruction-${run_id}"
            echo "run_id=$run_id" >> $GITHUB_OUTPUT
            echo "run_number=$run_number" >> $GITHUB_OUTPUT
            echo "artifact_name=$artifact_name" >> $GITHUB_OUTPUT

  download-cfr-artifact:
    name: Download CFR Artifact
    needs: find-latest-cfr-run
    runs-on: ubuntu-latest
    permissions:
      actions: read

    steps:
      - name: Download artifact from CFR run
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.find-latest-cfr-run.outputs.artifact_name }}
          path: ./cfr-data
          run-id: ${{ needs.find-latest-cfr-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Verify downloaded files
        run: |
          echo "Downloaded CFR artifacts:"
          ls -lh ./cfr-data/
          echo ""
          echo "Checking subdirectories:"
          find ./cfr-data -type f -name "*.nc" | head -20

      - name: Flatten directory structure
        run: |
          echo "Flattening directory structure for presto-viz..."
          # Find all .nc files and move them to cfr-data root
          find ./cfr-data -type f -name "*.nc" -exec mv {} ./cfr-data/ \;
          # Remove empty subdirectories
          find ./cfr-data -type d -empty -delete
          echo ""
          echo "Files after flattening:"
          ls -lh ./cfr-data/

      - name: Re-upload for presto-viz
        uses: actions/upload-artifact@v4
        with:
          name: cfr-data-for-viz-${{ github.run_number }}
          path: ./cfr-data/
          retention-days: 7

  validate:
    name: Run Validation
    needs: [find-latest-cfr-run, download-cfr-artifact]
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CFR data artifact
        uses: actions/download-artifact@v4
        with:
          name: cfr-data-for-viz-${{ github.run_number }}
          path: ./cfr-data

      - name: Verify reconstruction data
        run: |
          echo "Available NetCDF files:"
          ls -lh ./cfr-data/*.nc

      - name: Pull Docker image
        run: docker pull davidedge/lmr2:latest

      - name: Run validation script
        run: |
          docker run --rm \
            -v $(pwd)/validate_recon.py:/app/validate_recon.py:ro \
            -v $(pwd)/cfr-data:/recons:ro \
            -v $(pwd)/validation:/validation \
            -e RECON_DIR=/recons \
            -e VALIDATION_DIR=/validation \
            davidedge/lmr2:latest \
            conda run -n cfr-env python /app/validate_recon.py

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-output-${{ github.run_number }}
          path: ./validation/
          retention-days: 30

  visualize:
    name: Generate Presto Visualization
    needs: [find-latest-cfr-run, download-cfr-artifact]
    # uses: DaveEdge1/presto-viz/.github/workflows/presto-viz-reusable.yml@fix/cfr-dimension-order
    uses: DaveEdge1/presto-viz/.github/workflows/presto-viz-reusable.yml@main
    with:
      reconstruction_id: CFR_Run_${{ needs.find-latest-cfr-run.outputs.run_number }}_Reviz_${{ github.run_number }}
      artifact_name: cfr-data-for-viz-${{ github.run_number }}

  deploy-to-github-pages:
    name: Deploy to GitHub Pages
    needs: [find-latest-cfr-run, visualize, validate]
    if: always() && needs.visualize.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download visualization artifact
        uses: actions/download-artifact@v4
        with:
          name: presto-viz-output-CFR_Run_${{ needs.find-latest-cfr-run.outputs.run_number }}_Reviz_${{ github.run_number }}
          path: ./visualization-output

      - name: Download validation artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: validation-output-${{ github.run_number }}
          path: ./visualization-output/validation

      - name: Prepare Pages content
        run: |
          find ./visualization-output -type f -name "*.zip" -delete
          if [ -d "visualization-output/viz" ]; then
            mv visualization-output/viz visualization-output/docs
          fi

          # Landing page with links to visualization and validation
          HAS_VALIDATION=""
          if [ -f "./visualization-output/validation/index.html" ]; then
            HAS_VALIDATION="<p><a href='validation/index.html'>Validation Results</a></p>"
          fi

          cat > ./visualization-output/index.html << HTMLEOF
          <!DOCTYPE html>
          <html><head><title>LMR2 Results</title>
          <style>body{font-family:sans-serif;text-align:center;padding:40px;}</style>
          </head><body>
          <h1>LMR2 Reconstruction Results</h1>
          <p><a href="docs/visualizer.html">Interactive Visualization</a></p>
          ${HAS_VALIDATION}
          </body></html>
          HTMLEOF

          ls -lah ./visualization-output/
          ls -lah ./visualization-output/validation/ 2>/dev/null || echo "No validation output"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./visualization-output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

